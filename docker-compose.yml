services:
  ghidra:
    image: ${RUNNER_IMAGE:-danilid/ireng-runner:2.0.1}
    container_name: ghidra_headless
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        set -e
        export XDG_CONFIG_HOME=/data/shared/ghidra-config
        mkdir -p /data/shared/ghidra-config

        # Remove PEP 668 externally-managed marker
        rm -f /usr/lib/python3*/EXTERNALLY-MANAGED 2>/dev/null || true

        # Install python3-venv (needed for venv creation with pip)
        apt-get update 2>/dev/null && \
          apt-get install -y --no-install-recommends python3-venv 2>/dev/null || true

        # Detect Ghidra application ID for the venv path
        GHIDRA_PROPS=$$(find /usr/share/ghidra -name "application.properties" -path "*/application/*" 2>/dev/null | head -1)
        if [ -n "$$GHIDRA_PROPS" ]; then
          APP_NAME=$$(grep "^application.name" "$$GHIDRA_PROPS" | cut -d= -f2 | tr ' ' '_')
          APP_VER=$$(grep "^application.version" "$$GHIDRA_PROPS" | cut -d= -f2)
          APP_REL=$$(grep "^application.release.name" "$$GHIDRA_PROPS" | cut -d= -f2)
          GHIDRA_ID="$${APP_NAME}_$${APP_VER}_$${APP_REL}"
        else
          GHIDRA_ID="ghidra_12.0.1_DEV"
        fi

        VENV_PATH="/data/shared/ghidra-config/ghidra/$${GHIDRA_ID}/venv"
        PYGHIDRA_DIST="/usr/share/ghidra/Ghidra/Features/PyGhidra/pypkg/dist"

        # Only set up if pyghidra is not already importable in the venv
        if ! "$$VENV_PATH/bin/python3" -c "import pyghidra" 2>/dev/null; then
          echo "Setting up PyGhidra venv at $$VENV_PATH ..."
          rm -rf "$$VENV_PATH" 2>/dev/null || true
          python3 -m venv "$$VENV_PATH"
          "$$VENV_PATH/bin/pip" install --no-index -f "$$PYGHIDRA_DIST" pyghidra
          "$$VENV_PATH/bin/python3" -c "import pyghidra; print('pyghidra', pyghidra.__version__, 'installed')"
        else
          echo "PyGhidra already installed in venv"
        fi

        echo "Ghidra container ready"
        tail -f /dev/null
    volumes:
      - ghidra_projects:/data/projects
      - ghidra_shared:/data/shared
    healthcheck:
      test: [ "CMD", "sh", "-c", "test -f /data/shared/ghidra-config/ghidra/*/venv/bin/python3 || python3 -c 'import pyghidra' 2>/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  radare2:
    image: radare/radare2:latest
    container_name: radare2
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        # Install decompiler plugins (best-effort)
        r2pm -Ui r2ghidra 2>/dev/null || echo "r2ghidra not available"
        r2pm -Ui r2dec 2>/dev/null || echo "r2dec not available"
        touch /tmp/.r2_ready
        echo "Radare2 container ready"
        tail -f /dev/null
    volumes:
      - ghidra_shared:/data/shared
    healthcheck:
      test: [ "CMD", "cat", "/tmp/.r2_ready" ]
      interval: 5s
      timeout: 3s
      retries: 10

  qiling:
    build:
      context: ./backend
      dockerfile: Dockerfile.qiling
    container_name: qiling_emulator
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        python3 -c "import qiling; print('Qiling', qiling.__version__)"
        touch /tmp/.qiling_ready
        echo "Qiling container ready"
        tail -f /dev/null
    volumes:
      - ghidra_shared:/data/shared
      - ./backend/qiling_scripts:/opt/qiling/scripts
    healthcheck:
      test: [ "CMD", "cat", "/tmp/.qiling_ready" ]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: ireng_postgres
    environment:
      POSTGRES_USER: ireng
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ireng_secret}
      POSTGRES_DB: ireng
      POSTGRES_MULTIPLE_DATABASES: langfuse
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ireng" ]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: ireng_langfuse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ireng:${POSTGRES_PASSWORD:-ireng_secret}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://${HOST:-localhost}:${LANGFUSE_PORT:-3100}}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-langfuse-secret}
      SALT: ${LANGFUSE_SALT:-changeme-langfuse-salt}
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      HOSTNAME: "0.0.0.0"
    ports:
      - "${LANGFUSE_PORT:-3100}:3000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://0.0.0.0:3000/api/public/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  agent:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      ghidra:
        condition: service_healthy
      radare2:
        condition: service_healthy
      qiling:
        condition: service_healthy
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    environment:
      GHIDRA_DOCKER_IMAGE: ${RUNNER_IMAGE:-danilid/ireng-runner:2.0.1}
      GHIDRA_PROJECT_ROOT: /data/projects
      GHIDRA_SHARED_ROOT: /data/shared
      GHIDRA_VOLUME_CONTAINER: ghidra_headless
      GHIDRA_SCRIPTS_ROOT: /data/shared/scripts
      GHIDRA_SCRIPTS_SOURCE: /app/ghidra_scripts
      GHIDRA_HEADLESS_SCRIPT_PATH: /usr/share/ghidra/support/pyghidraRun
      GHIDRA_INSTALL_PATH: /usr/share/ghidra
      DOCKER_CLI_PATH: /usr/bin/docker
      LLM_MODEL_NAME: glm-5
      LLM_PROVIDER: openai
      MAX_DECOMPILATION_TIME: "30"
      DEFAULT_ANALYSIS_TIMEOUT: "120"
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_BASE_URL: https://api.z.ai/api/coding/paas/v4/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      R2_CONTAINER_NAME: radare2
      R2_SHARED_ROOT: /data/shared
      R2_TIMEOUT: "60"
      ENABLE_R2: "true"
      QILING_CONTAINER_NAME: qiling_emulator
      QILING_SHARED_ROOT: /data/shared
      QILING_SCRIPTS_ROOT: /opt/qiling/scripts
      QILING_ROOTFS_BASE: /opt/qiling/rootfs
      QILING_TIMEOUT: "60"
      ENABLE_QILING: "true"
      DATABASE_URL: postgresql://ireng:${POSTGRES_PASSWORD:-ireng_secret}@postgres:5432/ireng
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-changeme-gireng-jwt-secret-key}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gireng.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      REGISTRATION_ENABLED: "true"
    volumes:
      - ghidra_projects:/data/projects
      - ghidra_shared:/data/shared
      - ./backend:/app
      - ./backend/ghidra_scripts:/app/ghidra_scripts
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${API_PORT:-8080}:8080"

  ui:
    build:
      context: .
      dockerfile: app/Dockerfile.ui
      args:
        # Leave VITE_API_BASE_URL empty → frontend uses relative URLs
        # The Vite preview proxy (server-side) forwards to BACKEND_INTERNAL_URL
        VITE_API_BASE_URL: ""
        VITE_WS_URL: ""
        VITE_APP_NAME: ${VITE_APP_NAME:-IrengSec}
        BACKEND_INTERNAL_URL: "http://agent:8080"
    environment:
      # Runtime env for the Vite preview Node.js process (proxy target)
      BACKEND_INTERNAL_URL: "http://agent:8080"
    ports:
      - "${UI_PORT:-4173}:4173"

volumes:
  ghidra_projects:
  ghidra_shared:
  pgdata:
