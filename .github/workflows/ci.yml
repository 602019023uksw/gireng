name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-qiling-report:
    name: Backend Qiling + Report Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend
          pip install pytest pytest-asyncio

      - name: Run Backend Qiling/Report Tests
        run: |
          pytest -q \
            backend/tests/test_api.py \
            backend/tests/test_qiling_graph.py \
            backend/tests/test_qiling_tools.py \
            backend/tests/test_qiling_runner.py \
            backend/tests/test_ioc_verdict_qiling.py

  frontend-tests:
    name: Frontend ETA + Build Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm run test:run

      - name: Build Frontend
        run: npm run build

